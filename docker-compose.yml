# Local development infrastructure ONLY (no API container).
# Run the API on the host with `bun run dev`; this brings up its dependencies.
# Add new infra here as the project grows (e.g. a message queue).
services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: app
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  # Trace backend for local development — opt-in via the "tracing" profile:
  #   docker compose --profile tracing up -d
  # then set OTEL_ENABLED=true in .env and open http://localhost:16686.
  # The API's default OTEL_EXPORTER_OTLP_ENDPOINT already points here.
  jaeger:
    image: jaegertracing/all-in-one:1.62.0
    profiles: ["tracing"]
    restart: unless-stopped
    environment:
      COLLECTOR_OTLP_ENABLED: "true"
    ports:
      - "4318:4318" # OTLP/HTTP ingest
      - "16686:16686" # Jaeger UI

volumes:
  pgdata:
